# Traefik Static Configuration

# API and Dashboard
api:
  dashboard: true
  insecure: true  # WARNING: Only for testing! Dashboard on :8080 without auth

# Entrypoints (ports Traefik listens on)
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

# Docker provider - automatically discover containers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false  # Only expose containers with traefik.enable=true
    network: traefik-net

# Log level
log:
  level: INFO

accessLog: {}

certificatesResolvers:
  letsencrypt:
    acme:
      email: ${LETSENCRYPT_EMAIL}
      storage: /traefik-data/acme.json
      httpChallenge:
        entryPoint: web
