name: Build and Deploy to k3s

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: ./mvnw clean package

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to k3s
    runs-on: self-hosted
    environment: hetzner
    needs: build-and-push

    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.K3S_CA_CERT }}" | base64 -d > /tmp/ca.crt

          kubectl config set-cluster k3s \
            --server=${{ vars.K3S_API_SERVER }} \
            --certificate-authority=/tmp/ca.crt \
            --embed-certs=true

          kubectl config set-credentials github-deployer \
            --token=${{ secrets.K3S_SA_TOKEN }}

          kubectl config set-context k3s \
            --cluster=k3s \
            --user=github-deployer \
            --namespace=ryyppynet

          kubectl config use-context k3s
          rm /tmp/ca.crt

      - name: Test kubectl connection
        run: kubectl get nodes
