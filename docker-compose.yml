services:
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
      - traefik-data:/traefik-data
    networks:
      - traefik-net

  # Spring Boot application
  ryyppynet:
    build: .
    container_name: ryyppynet
    restart: on-failure:2
    environment:
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ryyppynet.rule=Host(`ryyppy.net`)"
      - "traefik.http.routers.ryyppynet.entrypoints=websecure"
      - "traefik.http.routers.ryyppynet.tls.certresolver=letsencrypt"
      - "traefik.http.services.ryyppynet.loadbalancer.server.port=8080"
    networks:
      - traefik-net

networks:
  traefik-net:
    name: traefik-net

volumes:
  traefik-data:
