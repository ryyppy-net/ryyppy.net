services:
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
      - traefik-data:/traefik-data
    networks:
      - traefik-net

  # Spring Boot application
  ryyppynet:
    build: .
    container_name: ryyppynet
    restart: on-failure:2
    environment:
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ryyppynet.rule=Host(`test.ryyppy.net`)"
      - "traefik.http.routers.ryyppynet.entrypoints=websecure"
      - "traefik.http.routers.ryyppynet.tls.certresolver=letsencrypt"
      - "traefik.http.services.ryyppynet.loadbalancer.server.port=8080"
    networks:
      - traefik-net

  # Simple test service
  whoami:
    image: traefik/whoami
    container_name: whoami
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.test.ryyppy.net`)"
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls.certresolver=letsencrypt"
      - "traefik.http.services.whoami.loadbalancer.server.port=80"
    networks:
      - traefik-net

networks:
  traefik-net:
    name: traefik-net

volumes:
  traefik-data:
